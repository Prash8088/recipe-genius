<!DOCTYPE html>
<html>
<head>
  <title>Recipe Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    #recipeImage {
      transition: transform 0.4s ease;
    }

    #recipeImage:hover {
      transform: scale(1.03);
    }

    h1 {
      color: #ff6b6b;
    }

    button {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      background: #1e90ff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0f75d1;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1 id="title"></h1>
    <img id="recipeImage" 
         style="width:100%; border-radius:10px; margin-bottom:20px; height:300px; object-fit:cover;">

    <h3>Ingredients</h3>
    <p id="ingredients"></p>

    <h3>Directions</h3>
    <p id="directions"></p>

    <button onclick="goBack()">⬅ Back</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    async function loadRecipe() {
      const response = await fetch(`http://localhost:5000/recipe/${id}`);
      const data = await response.json();

      document.getElementById("title").innerText = data.title;
      document.getElementById("recipeImage").src =
  data.image || "https://picsum.photos/800/500";

      document.getElementById("ingredients").innerText = data.ingredients;
      document.getElementById("directions").innerText = data.directions;
    }

    function goBack() {
      window.history.back();
    }

    loadRecipe();
  </script>

</body>
</html>
